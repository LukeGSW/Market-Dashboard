name: Aggiornamento Dati Base Dashboard

on:
  schedule:
    # Esegue ogni giorno alle 01:00 UTC (dopo la chiusura americana)
    - cron: '0 1 * * *'
  workflow_dispatch: # Permette di avviarlo manualmente con un click

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installazione librerie
        run: pip install requests

      - name: Esecuzione Script Quant
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: python updater.py

      - name: Commit e Push dei nuovi dati
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git commit -m "Aggiornamento giornaliero data.json" || echo "Nessuna modifica da committare"
          git push
