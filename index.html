<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kriterion Quant - Live Terminal</title>
    <style>
        body { background-color: #000000; color: #d0d0d0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        h1, h2 { color: #ff9900; margin-bottom: 10px; text-transform: uppercase; font-size: 1.2rem; }
        #auth-section { background-color: #111; border: 1px solid #333; padding: 20px; border-radius: 4px; max-width: 500px; margin-bottom: 20px; }
        input[type="text"] { background-color: #000; color: #0f0; border: 1px solid #555; padding: 10px; width: 70%; font-family: inherit; }
        button { background-color: #333; color: #fff; border: 1px solid #555; padding: 10px 15px; cursor: pointer; font-family: inherit; margin-top: 10px; }
        button:hover { background-color: #555; }
        #debug-bar { color: #00ff00; font-style: italic; margin-bottom: 15px; font-size: 0.9rem;}
        #dashboard { display: none; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background-color: #121212; border: 1px solid #333; border-radius: 4px; padding: 20px 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; }
        .ticker-name { font-weight: bold; font-size: 1.2rem; color: #ffffff; letter-spacing: 1px; }
        .price { font-size: 2.2rem; margin: 10px 0 5px 0; }
        .pct { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .positive-text { color: #00ff00; } .negative-text { color: #ff0000; } .neutral-text { color: #d0d0d0; }
        .gauge-container { width: 100%; position: relative; margin-top: 5px; }
        .gauge-track { height: 8px; background: #2a2a2a; border-radius: 4px; position: relative; width: 100%; overflow: hidden; }
        .gauge-center-mark { position: absolute; left: 50%; top: -3px; height: 14px; width: 2px; background: #fff; transform: translateX(-50%); z-index: 3; }
        .sd-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255, 255, 255, 0.5); z-index: 2; }
        .sd-marker.left-2sd { left: 16.66%; } .sd-marker.right-2sd { right: 16.66%; }
        .gauge-bar { position: absolute; height: 100%; top: 0; border-radius: 3px; transition: width 0.3s ease-out; width: 0%; z-index: 1; }
        .gauge-bar.positive { left: 50%; background: #00ff00; } .gauge-bar.negative { right: 50%; background: #ff0000; }
        .prev-close-label { font-size: 0.75rem; color: #888; margin-top: 8px; font-family: sans-serif; }
    </style>
</head>
<body>
    <h1>Kriterion Quant - Live Terminal</h1>

    <div id="auth-section">
        <p>Inserisci la API Key per attivare i WebSocket EODHD in streaming.</p>
        <input type="text" id="api_key_input" placeholder="EODHD API Token">
        <button onclick="saveApiKey()">Connetti Terminale Live</button>
    </div>

    <div id="dashboard">
        <button onclick="clearApiKey()" style="float: right; font-size: 0.8rem; padding: 5px 10px;">Reset API Key WS</button>
        <div id="debug-bar"></div>
        
        <h2>Indici & ETF</h2><div id="grid-indices" class="grid-container"></div>
        <h2>Magnificent 7</h2><div id="grid-mag7" class="grid-container"></div>
        <h2>Value Stocks</h2><div id="grid-value" class="grid-container"></div>
        <h2>Commodities, Bonds & Forex (ETF)</h2><div id="grid-commodities" class="grid-container"></div>
        <h2>Crypto (Binance)</h2><div id="grid-crypto" class="grid-container"></div>
    </div>

    <script>
        const assetGroups = {
            "indices": ["SPY", "QQQ", "DIA", "IWM", "EWG", "EWJ"],
            "mag7": ["AAPL", "NVDA", "TSLA", "MSFT", "AMZN", "META", "GOOGL"],
            "value": ["PG", "WMT", "JNJ", "KO", "JPM", "XOM", "AMAT", "AEM"],
            "commodities": ["TLT", "GLD", "SLV", "USO", "UNG", "CPER", "FXE", "FXY"] 
        };
        const cryptos = ["btcusdt", "ethusdt", "solusdt"];
        let eodToken = "";
        
        let prevCloses = {}; 
        let stdDeviations = {}; 
        const GAUGE_MAX_SD = 3.0; 

        window.onload = function() {
            const storedKey = localStorage.getItem('eodhd_api_token');
            if (storedKey) { eodToken = storedKey; startTerminal(); }
        };

        function saveApiKey() {
            const key = document.getElementById('api_key_input').value.trim();
            if (key) { localStorage.setItem('eodhd_api_token', key); eodToken = key; startTerminal(); }
        }

        function clearApiKey() {
            localStorage.removeItem('eodhd_api_token'); location.reload();
        }

        async function startTerminal() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            buildUI();
            
            document.getElementById('debug-bar').innerText = "Caricamento statistiche di base (data.json)...";
            
            try {
                const res = await fetch('data.json?t=' + Date.now());
                if (!res.ok) throw new Error(`File data.json non trovato (HTTP ${res.status}). Assicurati che la GitHub Action sia terminata con successo.`);
                
                const db = await res.json();
                
                for (const ticker in db) {
                    prevCloses[ticker] = db[ticker].prevClose;
                    stdDeviations[ticker] = db[ticker].stdDev;
                }
                
                document.getElementById('debug-bar').innerText = "Database sincronizzato. Apertura WebSocket...";
                document.getElementById('debug-bar').style.color = "#00ff00";
                setTimeout(() => { document.getElementById('debug-bar').innerText = ""; }, 3000);
                
                updateAllLabels();
                initBinanceWS();
                initEodhdWS();
                
            } catch(e) {
                console.error(e);
                document.getElementById('debug-bar').innerText = e.message;
                document.getElementById('debug-bar').style.color = "#ff0000";
            }
        }

        function buildUI() {
            for (const [group, tickers] of Object.entries(assetGroups)) {
                const container = document.getElementById(`grid-${group}`);
                tickers.forEach(ticker => { container.innerHTML += createCardHTML(ticker); });
            }
            const cryptoContainer = document.getElementById('grid-crypto');
            cryptos.forEach(crypto => {
                const displayTicker = crypto.toUpperCase().replace('USDT', '');
                cryptoContainer.innerHTML += createCardHTML(displayTicker, crypto);
            });
        }

        function createCardHTML(displayTicker, internalId = displayTicker) {
            return `
                <div class="card" id="card_${internalId}">
                    <div class="ticker-name">${displayTicker}</div>
                    <div class="price neutral-text" id="price_${internalId}">--.---</div>
                    <div class="pct neutral-text" id="pct_${internalId}">0.00%</div>
                    <div class="gauge-container">
                        <div class="gauge-track">
                            <div class="sd-marker left-2sd" title="-2 SD"></div>
                            <div class="sd-marker right-2sd" title="+2 SD"></div>
                            <div class="gauge-bar" id="gauge_bar_${internalId}"></div>
                        </div>
                        <div class="gauge-center-mark"></div>
                        <div class="prev-close-label" id="prev_label_${internalId}">Prev: -- | 1σ: --</div>
                    </div>
                </div>
            `;
        }

        function updateAllLabels() {
            const allSymbols = [...assetGroups.indices, ...assetGroups.mag7, ...assetGroups.value, ...assetGroups.commodities, ...cryptos];
            allSymbols.forEach(id => {
                const prevLabel = document.getElementById(`prev_label_${id}`);
                const decimals = (id.includes('usdt') || assetGroups.indices.includes(id)) ? 2 : 3;
                const basePrice = prevCloses[id];
                const oneSDValue = stdDeviations[id];
                
                if (prevLabel && basePrice) {
                    let sdText = oneSDValue ? ` | 1σ: ${(oneSDValue).toFixed(decimals)}` : '';
                    prevLabel.innerText = `Prev: ${basePrice.toFixed(decimals)}${sdText}`;
                }
            });
        }

        // --- WEBSOCKETS ---
        function initBinanceWS() {
            const streams = cryptos.map(c => `${c}@ticker`).join('/');
            const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                const ticker = msg.stream.split('@')[0];
                
                // FIX Binance: Allinea la base statistica all'Open rolling delle 24h
                if (msg.data && msg.data.o) {
                    prevCloses[ticker] = parseFloat(msg.data.o);
                }
                
                updateCard(ticker, parseFloat(msg.data.c));
            };
        }

        function initEodhdWS() {
            const wsUs = new WebSocket(`wss://ws.eodhistoricaldata.com/ws/us?api_token=${eodToken}`);
            const allUsTickers = [...assetGroups.indices, ...assetGroups.mag7, ...assetGroups.value, ...assetGroups.commodities];
            wsUs.onopen = () => { allUsTickers.forEach(ticker => { wsUs.send(JSON.stringify({"action": "subscribe", "symbols": ticker})); }); };
            wsUs.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data && data.s && data.p) {
                        updateCard(data.s, parseFloat(data.p));
                    }
                } catch (e) {}
            };
        }

        // --- UI REFRESH ---
        function updateCard(id, price) {
            const priceEl = document.getElementById(`price_${id}`);
            const pctEl = document.getElementById(`pct_${id}`);
            const gaugeBar = document.getElementById(`gauge_bar_${id}`);
            
            if (!priceEl) return;

            const decimals = (id.includes('usdt') || assetGroups.indices.includes(id)) ? 2 : 3;
            priceEl.innerText = price.toFixed(decimals);
            
            const basePrice = prevCloses[id];
            const oneSDValue = stdDeviations[id];

            if (basePrice && basePrice > 0) {
                const pct = ((price - basePrice) / basePrice) * 100;
                pctEl.innerText = (pct > 0 ? '+' : '') + pct.toFixed(2) + '%';
                pctEl.className = `pct ${pct >= 0 ? 'positive-text' : 'negative-text'}`;

                if (gaugeBar && oneSDValue) {
                    const priceDelta = price - basePrice;
                    const moveInSD = priceDelta / oneSDValue;
                    let fillPercentage = (Math.abs(moveInSD) / GAUGE_MAX_SD) * 50; 
                    if (fillPercentage > 50) fillPercentage = 50; 
                    gaugeBar.style.width = `${fillPercentage}%`;
                    gaugeBar.className = `gauge-bar ${priceDelta >= 0 ? 'positive' : 'negative'}`;
                }
            }
        }
    </script>
</body>
</html>
